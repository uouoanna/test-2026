<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTCU 通識教育中心成果網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="text-xl font-bold text-blue-700">NTCU 通識教育中心</span>
            <div class="space-x-4 text-sm font-medium">
                <a href="#" class="hover:text-blue-600 transition">首頁</a>
                <a href="#" class="hover:text-blue-600 transition">計畫成果</a>
            </div>
        </div>
    </nav>

    <header class="py-16 px-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-6 tracking-tight">
                NTCU 通識教育中心成果網站
            </h1>
            <div class="h-1 w-20 bg-yellow-400 mx-auto rounded-full"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        
        <section class="mb-16">
            <div class="bg-white p-8 rounded-2xl shadow-md border-l-8 border-blue-500">
                <h2 class="text-2xl font-bold mb-4 flex items-center">
                    <span class="mr-2">📝</span> 計畫簡介
                </h2>
                <p class="leading-relaxed text-gray-600 text-lg">
                    這裡請貼上您的成果文字。例如：本計畫致力於推動通識課程的多元化與實踐性，透過跨領域的學習與在地連結，讓學生在專業領域之外，培養深厚的人文素養與社會責任感。
                </p>
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-bold mb-8 text-center">成果影像紀錄</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <div class="group overflow-hidden rounded-xl bg-white shadow-lg transition hover:-translate-y-2">
                    <img src="images/pic1.jpg" alt="成果照片 1" class="w-full h-56 object-cover">
                    <div class="p-4">
                        <p class="text-center font-medium text-gray-700">活動場景紀錄 A</p>
                    </div>
                </div>

                <div class="group overflow-hidden rounded-xl bg-white shadow-lg transition hover:-translate-y-2">
                    <img src="images/pic2.jpg" alt="成果照片 2" class="w-full h-56 object-cover">
                    <div class="p-4">
                        <p class="text-center font-medium text-gray-700">課堂實作細節 B</p>
                    </div>
                </div>

                <div class="group overflow-hidden rounded-xl bg-white shadow-lg transition hover:-translate-y-2">
                    <img src="images/pic3.jpg" alt="成果照片 3" class="w-full h-56 object-cover">
                    <div class="p-4">
                        <p class="text-center font-medium text-gray-700">學生作品展示 C</p>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-10 mt-20">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-sm">© 2026 國立臺中教育大學 通識教育中心</p>
            <p class="text-xs mt-2 italic">大學教育計畫成果展現</p>
        </div>
    </footer>

</body>
</html>
